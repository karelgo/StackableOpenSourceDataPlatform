name: Deploy Stackable RAG Demo

on:
  workflow_dispatch:
    inputs:
      subscription_id:
        description: Azure subscription ID override. Leave blank to use the AZURE_SUBSCRIPTION_ID secret.
        required: false
        default: ""
        type: string
      resource_group:
        description: Azure resource group for the AKS cluster
        required: false
        default: dev-stackable-rg
        type: string
      aks_cluster_name:
        description: AKS cluster name
        required: false
        default: dev-stackable-aks
        type: string
      location:
        description: Azure region for the AKS cluster
        required: false
        default: swedencentral
        type: string
      aks_node_vm_size:
        description: AKS node VM size
        required: false
        default: Standard_D8s_v3
        type: string
      ollama_cpu_request:
        description: CPU request for the Ollama deployment
        required: false
        default: "3"
        type: string
      ollama_cpu_limit:
        description: CPU limit for the Ollama deployment
        required: false
        default: "6"
        type: string
      allowed_source_ranges:
        description: Optional comma-separated CIDR allowlist for the OpenSearch Dashboards ingress. Leave blank to skip ingress exposure.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-stackable-rag
  cancel-in-progress: false

env:
  AZURE_CORE_OUTPUT: none
  SUBSCRIPTION_ID: ${{ inputs.subscription_id != '' && inputs.subscription_id || secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: ${{ inputs.resource_group }}
  AKS_CLUSTER_NAME: ${{ inputs.aks_cluster_name }}
  LOCATION: ${{ inputs.location }}
  USE_AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS != '' && 'true' || 'false' }}
  AZURE_CREDENTIALS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
  AZURE_CLIENT_ID_VALUE: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID_VALUE: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Deployment Inputs
        run: |
          missing=()
          [[ -n "${SUBSCRIPTION_ID}" ]] || missing+=("subscription_id input or AZURE_SUBSCRIPTION_ID secret")
          [[ -n "${RESOURCE_GROUP}" ]] || missing+=("resource_group input")
          [[ -n "${AKS_CLUSTER_NAME}" ]] || missing+=("aks_cluster_name input")
          [[ -n "${LOCATION}" ]] || missing+=("location input")
          if [[ ${#missing[@]} -gt 0 ]]; then
            printf 'Missing required deployment input(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Azure Login With Service Principal Secret
        if: ${{ env.USE_AZURE_CREDENTIALS == 'true' }}
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS_JSON }}

      - name: Validate Azure OIDC Secrets
        if: ${{ env.USE_AZURE_CREDENTIALS != 'true' }}
        run: |
          missing=()
          [[ -n "${AZURE_CLIENT_ID_VALUE}" ]] || missing+=("AZURE_CLIENT_ID")
          [[ -n "${AZURE_TENANT_ID_VALUE}" ]] || missing+=("AZURE_TENANT_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            printf 'Missing required OIDC secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Azure Login With OIDC
        if: ${{ env.USE_AZURE_CREDENTIALS != 'true' }}
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_VALUE }}
          tenant-id: ${{ env.AZURE_TENANT_ID_VALUE }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Deploy RAG AKS Stack
        env:
          AKS_NODE_VM_SIZE: ${{ inputs.aks_node_vm_size }}
          OLLAMA_CPU_REQUEST: ${{ inputs.ollama_cpu_request }}
          OLLAMA_CPU_LIMIT: ${{ inputs.ollama_cpu_limit }}
          ENABLE_PUBLIC_HTTPS_INGRESS: ${{ inputs.allowed_source_ranges != '' && 'true' || 'false' }}
          ALLOWED_SOURCE_RANGES: ${{ inputs.allowed_source_ranges }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          ENABLE_PUBLIC_NODEPORTS: "false"
        run: |
          bash ./scripts/deploy-stackable-rag-aks.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: |
          {
            echo "## Stackable RAG Demo"
            echo "- Subscription: \`${SUBSCRIPTION_ID}\`"
            echo "- Resource group: \`${RESOURCE_GROUP}\`"
            echo "- Cluster: \`${AKS_CLUSTER_NAME}\`"
            echo "- Location: \`${LOCATION}\`"
            echo "- Node size: \`${{ inputs.aks_node_vm_size }}\`"
            echo "- Ollama CPU request/limit: \`${{ inputs.ollama_cpu_request }} / ${{ inputs.ollama_cpu_limit }}\`"
            if [[ -n "${{ inputs.allowed_source_ranges }}" ]]; then
              echo "- Public HTTPS ingress: enabled"
              echo "- Allowed source ranges: \`${{ inputs.allowed_source_ranges }}\`"
            else
              echo "- Public HTTPS ingress: skipped"
            fi
            echo
            echo "See the workflow logs for the generated access details."
          } >> "${GITHUB_STEP_SUMMARY}"
