<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1500" viewBox="0 0 2200 1500" fill="none">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F8F4EC"/>
    <stop offset="55%" stop-color="#F4F8FF"/>
    <stop offset="100%" stop-color="#EEF8F3"/>
  </linearGradient>
  <linearGradient id="headerGlow" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#E59F3A" stop-opacity="0.55"/>
    <stop offset="50%" stop-color="#4B7BE5" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#2D9C8F" stop-opacity="0.45"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12304F" flood-opacity="0.10"/>
  </filter>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#12304F" flood-opacity="0.08"/>
  </filter>
  <style>
    .title { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 60px; font-weight: 700; fill: #14314D; letter-spacing: -1px; }
    .subtitle { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: 500; fill: #4D647D; }
    .eyebrow { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #5D7288; letter-spacing: 3px; }
    .section-title { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #17324C; }
    .section-subtitle { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 19px; font-weight: 500; fill: #5A6F86; }
    .card-title { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #18324A; }
    .card-body { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #4E657C; }
    .micro { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 17px; font-weight: 600; fill: #58708A; }
    .callout-title { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #14314D; }
    .callout-body { font-family: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #4D647D; }
  </style>
</defs>
<rect width="2200" height="1500" fill="url(#bg)"/><circle cx="1760" cy="170" r="210" fill="#DDEBFF" fill-opacity="0.65"/><circle cx="310" cy="1350" r="240" fill="#FFE8D8" fill-opacity="0.6"/><circle cx="2090" cy="1370" r="180" fill="#DFF6EE" fill-opacity="0.6"/><rect x="60" y="52" width="2080" height="118" rx="34" fill="#FFFFFF" fill-opacity="0.8" filter="url(#soft)"/><rect x="60" y="52" width="2080" height="10" rx="5" fill="url(#headerGlow)"/><text x="100" y="100" class="eyebrow">STACKABLE DATA PLATFORM ON AKS</text><text x="100" y="165" class="title">Operators and What They Do</text><text x="100" y="203" class="subtitle">A visual map of the 16 operators in the full platform bundle, grouped by platform role.</text><path d="M1040 1048 C1110 1048, 1120 1048, 1160 1048" stroke="#C4CFDA" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/><path d="M550 740 C550 780, 550 790, 550 790" stroke="#C4CFDA" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/><path d="M1590 740 C1590 780, 1590 790, 1590 790" stroke="#C4CFDA" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/><text x="1068" y="1037" class="micro">data products and policies</text><text x="580" y="775" class="micro">ingest</text><text x="1628" y="775" class="micro">serve and analyze</text><rect x="60" y="220" width="980" height="520" rx="34" fill="#FFF4E0" filter="url(#shadow)"/><rect x="60" y="220" width="980" height="12" rx="6" fill="#E59F3A"/><text x="94" y="282" class="section-title">Platform Foundations</text><text x="94" y="316" class="section-subtitle">Shared services that make the rest of the stack work reliably.</text><rect x="94.0" y="350.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="94.0" y="350.0" width="10" height="158.0" rx="5" fill="#E59F3A"/><text x="120.0" y="392" class="card-title"><tspan x="120.0" dy="0">Commons Operator</tspan></text><text x="120.0" y="434" class="card-body"><tspan x="120.0" dy="0">shared building blocks and</tspan><tspan x="120.0" dy="24">common platform APIs</tspan></text><rect x="561.0" y="350.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="561.0" y="350.0" width="10" height="158.0" rx="5" fill="#E59F3A"/><text x="587.0" y="392" class="card-title"><tspan x="587.0" dy="0">Secret Operator</tspan></text><text x="587.0" y="434" class="card-body"><tspan x="587.0" dy="0">manages TLS materials and</tspan><tspan x="587.0" dy="24">credentials</tspan></text><rect x="94.0" y="530.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="94.0" y="530.0" width="10" height="158.0" rx="5" fill="#E59F3A"/><text x="120.0" y="572" class="card-title"><tspan x="120.0" dy="0">Listener Operator</tspan></text><text x="120.0" y="614" class="card-body"><tspan x="120.0" dy="0">exposes listener endpoints and</tspan><tspan x="120.0" dy="24">service access</tspan></text><rect x="561.0" y="530.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="561.0" y="530.0" width="10" height="158.0" rx="5" fill="#E59F3A"/><text x="587.0" y="572" class="card-title"><tspan x="587.0" dy="0">ZooKeeper Operator</tspan></text><text x="587.0" y="614" class="card-body"><tspan x="587.0" dy="0">coordination and quorum for</tspan><tspan x="587.0" dy="24">distributed services</tspan></text><rect x="1160" y="220" width="980" height="520" rx="34" fill="#EAF9F6" filter="url(#shadow)"/><rect x="1160" y="220" width="980" height="12" rx="6" fill="#2D9C8F"/><text x="1194" y="282" class="section-title">Storage and Data Services</text><text x="1194" y="316" class="section-subtitle">Persistent storage, metadata, low-latency serving, and search.</text><rect x="1194.0" y="350.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1194.0" y="350.0" width="10" height="158.0" rx="5" fill="#2D9C8F"/><text x="1220.0" y="392" class="card-title"><tspan x="1220.0" dy="0">HDFS Operator</tspan></text><text x="1220.0" y="434" class="card-body"><tspan x="1220.0" dy="0">distributed file storage for</tspan><tspan x="1220.0" dy="24">platform datasets</tspan></text><rect x="1661.0" y="350.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1661.0" y="350.0" width="10" height="158.0" rx="5" fill="#2D9C8F"/><text x="1687.0" y="392" class="card-title"><tspan x="1687.0" dy="0">HBase Operator</tspan></text><text x="1687.0" y="434" class="card-body"><tspan x="1687.0" dy="0">low-latency NoSQL storage for</tspan><tspan x="1687.0" dy="24">fast lookups</tspan></text><rect x="1194.0" y="530.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1194.0" y="530.0" width="10" height="158.0" rx="5" fill="#2D9C8F"/><text x="1220.0" y="572" class="card-title"><tspan x="1220.0" dy="0">Hive Operator</tspan></text><text x="1220.0" y="614" class="card-body"><tspan x="1220.0" dy="0">metastore and table metadata</tspan><tspan x="1220.0" dy="24">services</tspan></text><rect x="1661.0" y="530.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1661.0" y="530.0" width="10" height="158.0" rx="5" fill="#2D9C8F"/><text x="1687.0" y="572" class="card-title"><tspan x="1687.0" dy="0">OpenSearch Operator</tspan></text><text x="1687.0" y="614" class="card-body"><tspan x="1687.0" dy="0">search and log analytics engine</tspan></text><rect x="60" y="790" width="980" height="520" rx="34" fill="#FFF0EC" filter="url(#shadow)"/><rect x="60" y="790" width="980" height="12" rx="6" fill="#E46E5C"/><text x="94" y="852" class="section-title">Streaming and Ingestion</text><text x="94" y="886" class="section-subtitle">Moves data into the platform and keeps it flowing.</text><rect x="94.0" y="920.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="94.0" y="920.0" width="10" height="158.0" rx="5" fill="#E46E5C"/><text x="120.0" y="962" class="card-title"><tspan x="120.0" dy="0">Kafka Operator</tspan></text><text x="120.0" y="1004" class="card-body"><tspan x="120.0" dy="0">durable event streaming backbone</tspan></text><rect x="561.0" y="920.0" width="445.0" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="561.0" y="920.0" width="10" height="158.0" rx="5" fill="#E46E5C"/><text x="587.0" y="962" class="card-title"><tspan x="587.0" dy="0">NiFi Operator</tspan></text><text x="587.0" y="1004" class="card-body"><tspan x="587.0" dy="0">flow-based ingestion, routing,</tspan><tspan x="587.0" dy="24">and ETL</tspan></text><rect x="1160" y="790" width="980" height="520" rx="34" fill="#EEF3FF" filter="url(#shadow)"/><rect x="1160" y="790" width="980" height="12" rx="6" fill="#4B7BE5"/><text x="1194" y="852" class="section-title">Processing and Analytics</text><text x="1194" y="886" class="section-subtitle">Compute, query, orchestration, dashboards, and policy control.</text><rect x="1194.0" y="920.0" width="289.3" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1194.0" y="920.0" width="10" height="158.0" rx="5" fill="#4B7BE5"/><text x="1220.0" y="962" class="card-title"><tspan x="1220.0" dy="0">Spark K8s Operator</tspan></text><text x="1220.0" y="1004" class="card-body"><tspan x="1220.0" dy="0">distributed Spark jobs on</tspan><tspan x="1220.0" dy="24">Kubernetes</tspan></text><rect x="1505.3" y="920.0" width="289.3" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1505.3" y="920.0" width="10" height="158.0" rx="5" fill="#4B7BE5"/><text x="1531.3333333333333" y="962" class="card-title"><tspan x="1531.3333333333333" dy="0">Trino Operator</tspan></text><text x="1531.3333333333333" y="1004" class="card-body"><tspan x="1531.3333333333333" dy="0">federated SQL query engine</tspan></text><rect x="1816.7" y="920.0" width="289.3" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1816.7" y="920.0" width="10" height="158.0" rx="5" fill="#4B7BE5"/><text x="1842.6666666666665" y="962" class="card-title"><tspan x="1842.6666666666665" dy="0">Druid Operator</tspan></text><text x="1842.6666666666665" y="1004" class="card-body"><tspan x="1842.6666666666665" dy="0">real-time OLAP and</tspan><tspan x="1842.6666666666665" dy="24">time-series analytics</tspan></text><rect x="1194.0" y="1100.0" width="289.3" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1194.0" y="1100.0" width="10" height="158.0" rx="5" fill="#4B7BE5"/><text x="1220.0" y="1142" class="card-title"><tspan x="1220.0" dy="0">Airflow Operator</tspan></text><text x="1220.0" y="1184" class="card-body"><tspan x="1220.0" dy="0">workflow orchestration and</tspan><tspan x="1220.0" dy="24">scheduling</tspan></text><rect x="1505.3" y="1100.0" width="289.3" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1505.3" y="1100.0" width="10" height="158.0" rx="5" fill="#4B7BE5"/><text x="1531.3333333333333" y="1142" class="card-title"><tspan x="1531.3333333333333" dy="0">Superset Operator</tspan></text><text x="1531.3333333333333" y="1184" class="card-body"><tspan x="1531.3333333333333" dy="0">BI dashboards and</tspan><tspan x="1531.3333333333333" dy="24">interactive analytics</tspan></text><rect x="1816.7" y="1100.0" width="289.3" height="158.0" rx="24" fill="#FFFFFF" fill-opacity="0.92"/><rect x="1816.7" y="1100.0" width="10" height="158.0" rx="5" fill="#4B7BE5"/><text x="1842.6666666666665" y="1142" class="card-title"><tspan x="1842.6666666666665" dy="0">OPA Operator</tspan></text><text x="1842.6666666666665" y="1184" class="card-body"><tspan x="1842.6666666666665" dy="0">policy enforcement and</tspan><tspan x="1842.6666666666665" dy="24">authorization</tspan></text><rect x="1310" y="1335" width="830" height="110" rx="28" fill="#FFFFFF" fill-opacity="0.88" filter="url(#soft)"/><rect x="1310" y="1335" width="14" height="110" rx="7" fill="#14314D"/><text x="1345" y="1380" class="callout-title">Stackable Cockpit</text><text x="1345" y="1413" class="callout-body">Platform UI for operations, visibility, and cluster-level administration. It is part of the platform surface, but not itself an operator.</text><text x="60" y="1450" class="micro">Current operator set: airflow, commons, druid, hbase, hdfs, hive, kafka, listener, nifi, opa, opensearch, secret, spark-k8s, superset, trino, zookeeper.</text></svg>